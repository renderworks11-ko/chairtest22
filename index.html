<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENDER WORKS - AR Preview</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #f0f0f0; }
        model-viewer {
            width: 100vw;
            height: 100vh;
        }
        /* AndroidのARボタンを左上に逃がす設定 */
        model-viewer::part(default-ar-button) {
            position: absolute;
            top: 20px;
            left: 20px;
            bottom: auto;
            right: auto;
            background-color: white;
            border-radius: 4px;
            padding: 4px;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="chair.glb" 
        ios-src="chair.usdz" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        touch-action="pan-y"
        shadow-intensity="1"
        alt="A 3D model of furniture">
    </model-viewer>

</body>
</html>
