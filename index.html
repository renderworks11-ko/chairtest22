<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENDER WORKS - AR Preview</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #f8f8f8; font-family: sans-serif; }
        model-viewer {
            width: 100vw;
            height: 100vh;
        }

        /* ARボタンの改造：左上に配置し、文字を追加する */
        model-viewer::part(default-ar-button) {
            position: absolute;
            top: 20px;
            left: 20px;
            bottom: auto;
            right: auto;
            
            /* ボタンの見た目：白背景に黒い枠線でハッキリと */
            background-color: #ffffff;
            border: 2px solid #333333;
            border-radius: 30px; /* 角を丸くして親しみやすく */
            padding: 12px 20px;
            
            /* アイコンと文字を横並びにする */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ボタンの中に「試し置きはこちら」の文字を合成 */
        model-viewer::part(default-ar-button)::after {
            content: "試し置きはこちら";
            margin-left: 8px; /* 立方体アイコンとの間隔 */
            font-size: 16px;
            font-weight: bold;
            color: #333333;
            white-space: nowrap;
        }

        /* 画面下のクレジット（任意：RENDER WORKSの名前を入れると信頼感が出ます） */
        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #888;
            font-size: 12px;
            pointer-events: none; /* ボタン操作を邪魔しない */
        }
    </style>
</head>
<body>

    <model-viewer 
        src="chair.glb" 
        ios-src="chair.usdz" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        touch-action="pan-y"
        shadow-intensity="1"
        alt="RENDER WORKS 3D Model">
        
        <div class="footer">PRESENTED BY RENDER WORKS</div>
    </model-viewer>

</body>
</html>
